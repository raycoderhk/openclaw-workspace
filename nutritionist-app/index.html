<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥗 營養師 App 3.0 - 個人營養顧問</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        /* Navigation */
        .nav {
            display: flex;
            background: #f8f9ff;
            border-radius: 0 0 20px 20px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .nav-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .nav-btn:hover { background: #eef1ff; }
        .nav-btn.active {
            background: white;
            border-bottom-color: #667eea;
            color: #667eea;
            font-weight: bold;
        }
        
        /* Content Sections */
        .section { display: none; padding: 30px; }
        .section.active { display: block; }
        
        /* Cards */
        .card {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Progress Bars */
        .progress-container {
            background: #e0e5ff;
            border-radius: 10px;
            height: 25px;
            margin: 10px 0;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
        .progress-calories { background: linear-gradient(90deg, #ff6b6b, #ff8e8e); }
        .progress-protein { background: linear-gradient(90deg, #4ecdc4, #7eddd6); }
        .progress-carbs { background: linear-gradient(90deg, #ffe66d, #fff0a0); color: #666; }
        .progress-fat { background: linear-gradient(90deg, #95e1d3, #b8ece6); color: #333; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }
        
        /* Forms */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e5ff;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        /* Upload Area */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { background: #f8f9ff; border-color: #764ba2; }
        .upload-icon { font-size: 4em; margin-bottom: 15px; }
        
        /* Meal Cards */
        .meal-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }
        .meal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .meal-type {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }
        .meal-nutrition {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nutrition-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
        }
        
        /* Food List */
        .food-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .food-icon { font-size: 2em; margin-right: 15px; }
        .food-info { flex: 1; }
        .food-name { font-weight: bold; color: #333; }
        .food-confidence { color: #667eea; font-size: 0.9em; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading.active { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Responsive */
        @media (max-width: 768px) {
            .nav { flex-wrap: wrap; }
            .nav-btn { flex: 1 1 50%; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🥗 營養師 App 3.0</h1>
            <p>Personal Nutrition Advisor - 你的專屬營養顧問</p>
        </div>
        
        <!-- Navigation -->
        <div class="nav">
            <button class="nav-btn active" onclick="showSection('dashboard')">📊 今日概覽</button>
            <button class="nav-btn" onclick="showSection('log-meal')">📝 記錄餐食</button>
            <button class="nav-btn" onclick="showSection('profile')">👤 個人檔案</button>
            <button class="nav-btn" onclick="showSection('progress')">📈 進度追蹤</button>
        </div>
        
        <!-- Dashboard Section -->
        <div id="dashboard" class="section active">
            <!-- Daily Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="caloriesValue">0</div>
                    <div class="stat-label">🔥 卡路里 (kcal)</div>
                    <div class="stat-label" id="caloriesGoal">目標：2000</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="proteinValue">0g</div>
                    <div class="stat-label">💪 蛋白質</div>
                    <div class="stat-label" id="proteinGoal">目標：150g</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="carbsValue">0g</div>
                    <div class="stat-label">🍚 碳水化合物</div>
                    <div class="stat-label" id="carbsGoal">目標：250g</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="fatValue">0g</div>
                    <div class="stat-label">🥑 脂肪</div>
                    <div class="stat-label" id="fatGoal">目標：65g</div>
                </div>
            </div>
            
            <!-- Progress Bars -->
            <div class="card">
                <h2 class="card-title">📊 今日進度</h2>
                <div class="progress-container">
                    <div class="progress-bar progress-calories" id="caloriesProgress" style="width: 0%">0%</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar progress-protein" id="proteinProgress" style="width: 0%">0%</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar progress-carbs" id="carbsProgress" style="width: 0%">0%</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar progress-fat" id="fatProgress" style="width: 0%">0%</div>
                </div>
            </div>
            
            <!-- Today's Meals -->
            <div class="card">
                <h2 class="card-title">🍽️ 今日餐食</h2>
                <div id="mealsList">
                    <div style="text-align: center; color: #999; padding: 40px;">
                        暫無餐食記錄<br>
                        <button class="btn" style="margin-top: 15px;" onclick="showSection('log-meal')">記錄第一餐</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Log Meal Section -->
        <div id="log-meal" class="section">
            <div class="card">
                <h2 class="card-title">📸 上傳食物圖片</h2>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">點擊上傳食物圖片</div>
                    <div style="color: #999; margin-top: 10px;">支援 JPG, PNG, WebP</div>
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)" style="display: none;">
                </div>
                <img id="preview" style="max-width: 100%; max-height: 400px; border-radius: 10px; margin: 20px 0; display: none;" alt="預覽">
            </div>
            
            <div class="card">
                <h2 class="card-title">🍽️ 選擇餐別</h2>
                <select class="form-select" id="mealType">
                    <option value="breakfast">🌅 早餐</option>
                    <option value="lunch">☀️ 午餐</option>
                    <option value="dinner">🌙 晚餐</option>
                    <option value="snack">🍎 小食</option>
                </select>
            </div>
            
            <div style="text-align: center;">
                <button class="btn" id="analyzeBtn" onclick="analyzeImage()" disabled>🔍 開始分析</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>正在分析食物...</div>
                <div style="color: #999; margin-top: 10px;">使用 MiniMax-01 視覺模型</div>
            </div>
            
            <div id="analysisResult" style="display: none;">
                <!-- Results will be displayed here -->
            </div>
        </div>
        
        <!-- Profile Section -->
        <div id="profile" class="section">
            <div class="card">
                <h2 class="card-title">👤 個人檔案</h2>
                <form id="profileForm" onsubmit="saveProfile(event)">
                    <div class="form-group">
                        <label class="form-label">姓名</label>
                        <input type="text" class="form-input" id="userName" placeholder="你的名字" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">年齡</label>
                        <input type="number" class="form-input" id="userAge" value="30" min="10" max="100">
                    </div>
                    <div class="form-group">
                        <label class="form-label">性別</label>
                        <select class="form-select" id="userGender">
                            <option value="male">男</option>
                            <option value="female">女</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">身高 (cm)</label>
                        <input type="number" class="form-input" id="userHeight" value="170" min="100" max="250">
                    </div>
                    <div class="form-group">
                        <label class="form-label">體重 (kg)</label>
                        <input type="number" class="form-input" id="userWeight" value="70" min="30" max="200" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">活動水平</label>
                        <select class="form-select" id="userActivity">
                            <option value="sedentary">久坐 (少運動)</option>
                            <option value="light">輕度 (每週 1-3 次運動)</option>
                            <option value="moderate" selected>中度 (每週 3-5 次運動)</option>
                            <option value="active">活躍 (每週 6-7 次運動)</option>
                            <option value="very_active">非常活躍 (體力勞動)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">目標</label>
                        <select class="form-select" id="userGoal">
                            <option value="lose">📉 減脂</option>
                            <option value="maintain" selected>⚖️ 維持</option>
                            <option value="gain">💪 增肌</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">💾 儲存檔案</button>
                </form>
            </div>
        </div>
        
        <!-- Progress Section -->
        <div id="progress" class="section">
            <div class="card">
                <h2 class="card-title">📈 體重追蹤</h2>
                <div class="form-group">
                    <label class="form-label">當前體重 (kg)</label>
                    <input type="number" class="form-input" id="progressWeight" step="0.1" placeholder="輸入體重">
                </div>
                <button class="btn" onclick="addProgress()">📝 記錄體重</button>
            </div>
            
            <div class="card">
                <h2 class="card-title">📊 歷史記錄</h2>
                <div id="progressHistory">
                    <div style="text-align: center; color: #999; padding: 40px;">暫無記錄</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // State
        let selectedFile = null;
        let currentAnalysis = null;
        const userId = 1; // Default user
        
        // Navigation
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
            
            if (sectionId === 'dashboard') {
                loadDashboard();
            } else if (sectionId === 'profile') {
                loadProfile();
            } else if (sectionId === 'progress') {
                loadProgress();
            }
        }
        
        // File Upload
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
                document.getElementById('analyzeBtn').disabled = false;
            }
        }
        
        // AI Analysis
        async function analyzeImage() {
            if (!selectedFile) return;
            
            document.getElementById('loading').classList.add('active');
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const imageData = e.target.result;
                    
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imageData })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        currentAnalysis = result.data;
                        displayAnalysisResult();
                        saveMeal(currentAnalysis);
                    } else {
                        alert('分析失敗：' + result.error);
                    }
                    
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('analyzeBtn').disabled = false;
                };
                reader.readAsDataURL(selectedFile);
            } catch (error) {
                alert('錯誤：' + error.message);
                document.getElementById('loading').classList.remove('active');
                document.getElementById('analyzeBtn').disabled = false;
            }
        }
        
        function displayAnalysisResult() {
            if (!currentAnalysis) return;
            
            const resultDiv = document.getElementById('analysisResult');
            resultDiv.style.display = 'block';
            
            const foods = currentAnalysis.foods || [];
            const total = currentAnalysis.total_nutrition || {};
            const tips = currentAnalysis.health_tips || [];
            
            resultDiv.innerHTML = `
                <div class="card">
                    <h2 class="card-title">🍽️ 識別結果</h2>
                    ${foods.map(f => `
                        <div class="food-item">
                            <div class="food-icon">🍽️</div>
                            <div class="food-info">
                                <div class="food-name">${escapeHtml(f.name)}</div>
                                <div class="food-confidence">${(f.confidence * 100).toFixed(0)}% 信心度</div>
                                ${f.description ? `<div style="color: #666; font-size: 0.9em;">${escapeHtml(f.description)}</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="card">
                    <h2 class="card-title">📊 營養成分</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">🔥 ${total.calories || 0}</div>
                            <div class="stat-label">卡路里 (kcal)</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">💪 ${total.protein || 0}g</div>
                            <div class="stat-label">蛋白質</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">🍚 ${total.carbs || 0}g</div>
                            <div class="stat-label">碳水</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">🥑 ${total.fat || 0}g</div>
                            <div class="stat-label">脂肪</div>
                        </div>
                    </div>
                </div>
                
                ${tips.length > 0 ? `
                    <div class="card">
                        <h2 class="card-title">💡 健康建議</h2>
                        <div class="tips-list">
                            ${tips.map((tip, i) => `
                                <div style="padding: 12px; background: white; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #667eea;">
                                    <strong>${i + 1}.</strong> ${escapeHtml(tip)}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn" onclick="saveMealAndRedirect()">✅ 儲存並返回首頁</button>
                </div>
            `;
        }
        
        async function saveMeal(analysis) {
            const mealType = document.getElementById('mealType').value;
            const foods = analysis.foods || [];
            
            await fetch('/api/meals', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    meal_type: mealType,
                    food_items: foods,
                    ai_analysis: JSON.stringify(analysis)
                })
            });
        }
        
        function saveMealAndRedirect() {
            showSection('dashboard');
            loadDashboard();
            // Reset
            document.getElementById('analysisResult').style.display = 'none';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('fileInput').value = '';
            selectedFile = null;
            currentAnalysis = null;
        }
        
        // Dashboard
        async function loadDashboard() {
            try {
                const response = await fetch(`/api/daily?user_id=${userId}`);
                const data = await response.json();
                
                if (data.success) {
                    const daily = data.daily;
                    const goals = data.goals;
                    const progress = data.progress;
                    
                    // Update stats
                    document.getElementById('caloriesValue').textContent = daily.total_calories || 0;
                    document.getElementById('proteinValue').textContent = `${Math.round(daily.total_protein_g || 0)}g`;
                    document.getElementById('carbsValue').textContent = `${Math.round(daily.total_carbs_g || 0)}g`;
                    document.getElementById('fatValue').textContent = `${Math.round(daily.total_fat_g || 0)}g`;
                    
                    document.getElementById('caloriesGoal').textContent = `目標：${goals.calories}`;
                    document.getElementById('proteinGoal').textContent = `目標：${goals.protein}g`;
                    document.getElementById('carbsGoal').textContent = `目標：${goals.carbs}g`;
                    document.getElementById('fatGoal').textContent = `目標：${goals.fat}g`;
                    
                    // Update progress bars
                    document.getElementById('caloriesProgress').style.width = `${Math.min(progress.calories || 0, 100)}%`;
                    document.getElementById('caloriesProgress').textContent = `${Math.round(progress.calories || 0)}%`;
                    document.getElementById('proteinProgress').style.width = `${Math.min(progress.protein || 0, 100)}%`;
                    document.getElementById('proteinProgress').textContent = `${Math.round(progress.protein || 0)}%`;
                    document.getElementById('carbsProgress').style.width = `${Math.min(progress.carbs || 0, 100)}%`;
                    document.getElementById('carbsProgress').textContent = `${Math.round(progress.carbs || 0)}%`;
                    document.getElementById('fatProgress').style.width = `${Math.min(progress.fat || 0, 100)}%`;
                    document.getElementById('fatProgress').textContent = `${Math.round(progress.fat || 0)}%`;
                    
                    // Load meals
                    loadMeals();
                }
            } catch (error) {
                console.error('Failed to load dashboard:', error);
            }
        }
        
        async function loadMeals() {
            try {
                const response = await fetch(`/api/meals?user_id=${userId}`);
                const data = await response.json();
                
                if (data.success && data.meals.length > 0) {
                    const mealsList = document.getElementById('mealsList');
                    const mealTypes = {
                        'breakfast': '🌅 早餐',
                        'lunch': '☀️ 午餐',
                        'dinner': '🌙 晚餐',
                        'snack': '🍎 小食'
                    };
                    
                    mealsList.innerHTML = data.meals.map(meal => `
                        <div class="meal-card">
                            <div class="meal-header">
                                <div class="meal-type">${mealTypes[meal.meal_type] || '🍽️'}</div>
                                <div style="color: #999;">${meal.calories || 0} kcal</div>
                            </div>
                            <div class="meal-nutrition">
                                <div class="nutrition-item">💪 ${Math.round(meal.protein_g || 0)}g</div>
                                <div class="nutrition-item">🍚 ${Math.round(meal.carbs_g || 0)}g</div>
                                <div class="nutrition-item">🥑 ${Math.round(meal.fat_g || 0)}g</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Failed to load meals:', error);
            }
        }
        
        // Profile
        async function loadProfile() {
            try {
                const response = await fetch(`/api/user?id=${userId}`);
                const data = await response.json();
                
                if (data.success && data.data) {
                    const user = data.data;
                    document.getElementById('userName').value = user.name || '';
                    document.getElementById('userAge').value = user.age || 30;
                    document.getElementById('userGender').value = user.gender || 'male';
                    document.getElementById('userHeight').value = user.height_cm || 170;
                    document.getElementById('userWeight').value = user.weight_kg || 70;
                    document.getElementById('userActivity').value = user.activity_level || 'moderate';
                    document.getElementById('userGoal').value = user.goal || 'maintain';
                }
            } catch (error) {
                console.error('Failed to load profile:', error);
            }
        }
        
        async function saveProfile(event) {
            event.preventDefault();
            
            const userData = {
                id: userId,
                name: document.getElementById('userName').value,
                age: parseInt(document.getElementById('userAge').value),
                gender: document.getElementById('userGender').value,
                height_cm: parseFloat(document.getElementById('userHeight').value),
                weight_kg: parseFloat(document.getElementById('userWeight').value),
                activity_level: document.getElementById('userActivity').value,
                goal: document.getElementById('userGoal').value
            };
            
            try {
                const response = await fetch('/api/user', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 檔案已儲存！');
                    loadDashboard();
                } else {
                    alert('儲存失敗：' + result.error);
                }
            } catch (error) {
                alert('錯誤：' + error.message);
            }
        }
        
        // Progress
        async function loadProgress() {
            try {
                const response = await fetch(`/api/progress?user_id=${userId}`);
                const data = await response.json();
                
                if (data.success && data.progress.length > 0) {
                    const historyDiv = document.getElementById('progressHistory');
                    historyDiv.innerHTML = data.progress.map(p => `
                        <div class="meal-card">
                            <div class="meal-header">
                                <div class="meal-type">📅 ${p.date}</div>
                                <div style="font-size: 1.5em; font-weight: bold; color: #667eea;">
                                    ⚖️ ${p.weight_kg || '-'} kg
                                </div>
                            </div>
                            ${p.notes ? `<div style="color: #666; margin-top: 10px;">${escapeHtml(p.notes)}</div>` : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Failed to load progress:', error);
            }
        }
        
        async function addProgress() {
            const weight = parseFloat(document.getElementById('progressWeight').value);
            
            if (!weight || weight < 20 || weight > 300) {
                alert('請輸入有效的體重 (20-300 kg)');
                return;
            }
            
            try {
                const response = await fetch('/api/progress', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        weight_kg: weight
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 體重已記錄！');
                    document.getElementById('progressWeight').value = '';
                    loadProgress();
                } else {
                    alert('記錄失敗：' + result.error);
                }
            } catch (error) {
                alert('錯誤：' + error.message);
            }
        }
        
        // Utility
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboard();
        });
    </script>
</body>
</html>

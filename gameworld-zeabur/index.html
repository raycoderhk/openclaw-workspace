<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 遊戲探索世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin: 20px 0;
            border-left: 5px solid #3498db;
        }
        .card h2 {
            color: #2c3e50;
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        .card p {
            color: #34495e;
            font-size: 1em;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }
        .emoji {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .note {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            text-align: left;
        }
        .note p {
            color: #856404;
            font-size: 0.9em;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎮</div>
        <h1>GameWorld</h1>
        <p>探索遊戲開發與職業發展的世界</p>
        
        <div class="card">
            <h2>📊 香港大學畢業生薪金比較</h2>
            <p>22 個行業詳細數據，包括薪金、工時、壓力、前景，以及大學科系對應。</p>
            <a href="research/salary-comparison.html" class="btn">查看薪金比較工具 →</a>
        </div>
        
        <div class="note">
            <p>💡 <strong>提示：</strong>這個工具幫助你了解不同行業的真實情況，用數據做出明智的職業選擇。</p>
        </div>
    </div>
</body>
</html>

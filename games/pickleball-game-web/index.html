<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Pickleball Master 匹克球挑戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .status-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .status-item .label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .status-item .value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .menu-btn:active {
            transform: translateY(-1px);
        }

        .game-area {
            display: none;
        }

        .game-area.active {
            display: block;
        }

        .question {
            font-size: 1.3em;
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #667eea;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 15px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
        }

        .option-btn.correct {
            background: #48bb78;
            border-color: #48bb78;
            color: white;
        }

        .option-btn.wrong {
            background: #f56565;
            border-color: #f56565;
            color: white;
        }

        .feedback {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
            border-left: 5px solid #48bb78;
        }

        .feedback.wrong {
            background: #fed7d7;
            color: #742a2a;
            border-left: 5px solid #f56565;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reflex-area {
            text-align: center;
            padding: 40px;
        }

        .reflex-target {
            font-size: 5em;
            margin: 20px 0;
            display: none;
        }

        .reflex-target.show {
            display: block;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .welcome-screen {
            text-align: center;
            padding: 40px;
        }

        .welcome-screen h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .welcome-screen p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group input {
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #667eea;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .level-badge {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .hidden {
            display: none;
        }

        .back-btn {
            background: #718096;
            margin-right: 10px;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #ed8936;
            color: white;
            border-radius: 15px;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .num {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-box .lbl {
            font-size: 0.85em;
            color: #718096;
        }

        .mode-select {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .mode-btn {
            background: white;
            border: 3px solid #667eea;
            color: #667eea;
            padding: 25px;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .mode-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .mode-btn .icon {
            font-size: 2em;
            display: block;
            margin-bottom: 10px;
        }

        .mode-btn .desc {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 8px;
        }

        .explanation-box {
            background: #ebf8ff;
            border-left: 5px solid #4299e1;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }

        .timer-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #ecc94b, #f56565);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏓 Pickleball Master</h1>
            <p>匹克球挑戰遊戲 + 教練認證模擬試</p>
        </div>

        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="card welcome-screen">
            <h2>歡迎來到匹克球挑戰遊戲！🎉</h2>
            <p>目標：成為匹克球大師！通過各種挑戰提升你的等級。</p>
            <p style="color: #ed8936; font-weight: bold;">🆕 新增：教練認證模擬考試 (30 條題目！)</p>
            
            <div class="input-group">
                <input type="text" id="playerName" placeholder="請輸入你的名字" maxlength="20">
            </div>
            
            <button class="btn" onclick="startGame()">開始遊戲 🚀</button>
        </div>

        <!-- Main Game Screen -->
        <div id="gameScreen" class="card hidden">
            <div class="status-bar">
                <div class="status-item">
                    <div class="label">玩家</div>
                    <div class="value" id="playerNameDisplay">-</div>
                </div>
                <div class="status-item">
                    <div class="label">等級</div>
                    <div class="value">Lv.<span id="levelDisplay">1</span></div>
                    <div class="level-badge" id="titleDisplay">🌱 新手</div>
                </div>
                <div class="status-item">
                    <div class="label">積分</div>
                    <div class="value" id="scoreDisplay">0</div>
                </div>
                <div class="status-item">
                    <div class="label">連勝</div>
                    <div class="value" id="streakDisplay">0</div>
                </div>
            </div>

            <div class="menu">
                <button class="menu-btn" onclick="showQuizMode()">📝 知識挑戰</button>
                <button class="menu-btn" onclick="startReflex()">⚡ 反應挑戰</button>
                <button class="menu-btn" onclick="startServe()">🎯 發球挑戰</button>
                <button class="menu-btn" onclick="showProgress()">📊 查看進度</button>
            </div>

            <div id="gameArea" class="game-area">
                <button class="btn back-btn" onclick="backToMenu()">← 返回選單</button>
                <div id="gameContent"></div>
            </div>
        </div>
    </div>

    <script>
        // LocalStorage Key
        const SAVE_KEY = 'pickleball_coach_save_v1';

        // Game State
        let gameState = {
            playerName: '',
            score: 0,
            level: 1,
            streak: 0,
            gamesPlayed: 0,
            title: '🌱 新手',
            quizStats: {
                total: 0,
                correct: 0,
                bestScore: 0
            }
        };

        // Load Saved Game
        function loadGame() {
            try {
                const saved = localStorage.getItem(SAVE_KEY);
                if (saved) {
                    const loaded = JSON.parse(saved);
                    gameState = { ...gameState, ...loaded };
                    console.log('✅ 已載入存档', gameState);
                    return true;
                }
            } catch (e) {
                console.error('❌ 讀取存档失敗:', e);
            }
            return false;
        }

        // Save Game
        function saveGame() {
            try {
                localStorage.setItem(SAVE_KEY, JSON.stringify(gameState));
                console.log('✅ 已保存', gameState);
            } catch (e) {
                console.error('❌ 保存失敗:', e);
            }
        }

        // Reset Progress
        function resetProgress() {
            if (confirm('⚠️ 確定要重置所有進度嗎？\n\n這將清除：\n- 玩家名字\n- 等級和積分\n- 所有統計數據\n\n此操作無法復原！')) {
                localStorage.removeItem(SAVE_KEY);
                gameState = {
                    playerName: '',
                    score: 0,
                    level: 1,
                    streak: 0,
                    gamesPlayed: 0,
                    title: '🌱 新手',
                    quizStats: {
                        total: 0,
                        correct: 0,
                        bestScore: 0
                    }
                };
                updateStatus();
                alert('✅ 進度已重置！');
                location.reload();
            }
        }

        // Auto-save helper
        function autoSave() {
            saveGame();
        }

        // Coach Certification Questions (30 題)
        const coachQuestions = [
            { q: "Pickleball 比賽開始時，發球方有幾多位球員可以發球？", options: ["A) 1 位", "B) 2 位", "C) 只有第一發球方 1 位，之後 2 位", "D) 視乎單打定雙打"], answer: 2, points: 15, category: "rules", explanation: "比賽開始時，第一發球方只有 1 位球員發球（右發球區）。之後每位球員輪到發球時都有兩次發球機會（左右區各一次）。" },
            { q: "什麼是「Two-Bounce Rule」（兩跳規則）？", options: ["A) 球必須在場地內彈跳兩次才計分", "B) 發球後，接發球方和發球方各必須讓球彈跳一次才能擊球", "C) 每個球員最多可以擊球兩次", "D) 球在網上彈跳兩次後繼續比賽"], answer: 1, points: 15, category: "rules", explanation: "兩跳規則：發球後，接發球方必須讓球彈跳一次接發，然後發球方也必須讓球彈跳一次才能擊球。之後雙方都可以 Volley（空中擊球）或落地擊球。" },
            { q: "標準 Pickleball 雙打場地的尺寸是？", options: ["A) 20' x 44' (6.10m x 13.41m)", "B) 36' x 78' (10.97m x 23.77m)", "C) 20' x 30' (6.10m x 9.14m)", "D) 25' x 50' (7.62m x 15.24m)"], answer: 0, points: 10, category: "court", explanation: "標準雙打場地 20 英尺 x 44 英尺 (6.10m x 13.41m)，與羽毛球雙打場地相同。" },
            { q: "「Kitchen」（非截擊區）的範圍是？", options: ["A) 距離球網 5 英尺 (1.52m)", "B) 距離球網 7 英尺 (2.13m)", "C) 距離球網 10 英尺 (3.05m)", "D) 距離球網 3 英尺 (0.91m)"], answer: 1, points: 10, category: "court", explanation: "Kitchen 是距離球網兩側各 7 英尺 (2.13m) 的區域。球員不能在 Kitchen 內 Volley（空中擊球），但可以在該區域內擊打落地球。" },
            { q: "標準 Pickleball 比賽的勝負條件是？", options: ["A) 先得 11 分，領先 2 分", "B) 先得 15 分，領先 2 分", "C) 先得 21 分，領先 2 分", "D) 以上皆可，視乎比賽規定"], answer: 3, points: 10, category: "scoring", explanation: "常見比賽制：11 分制（一般比賽）、15 分制（淘汰賽）、21 分制（決賽）。必須領先 2 分獲勝，或達到封頂分數。" },
            { q: "在雙打比賽中，發球分數呼叫順序是？", options: ["A) 發球方分數 - 接發球方分數 - 發球手編號", "B) 接發球方分數 - 發球方分數 - 發球手編號", "C) 發球手編號 - 發球方分數 - 接發球方分數", "D) 只需呼叫發球方分數"], answer: 0, points: 15, category: "scoring", explanation: "雙打發球呼叫：「發球方分數 - 接發球方分數 - 發球手編號」。例如「3-2-1」表示發球方 3 分，接發球方 2 分，第一發球手。" },
            { q: "發球時，球員必須？", options: ["A) 雙手發球", "B) 從下向上擊球，擊球點低於腰部", "C) 可以從上向下扣殺發球", "D) 必須用正手發球"], answer: 1, points: 15, category: "rules", explanation: "發球必須從下向上（underhand），擊球點低於腰部（肚臍水平），拍頭不可高於手腕。可以正手或反手發球。" },
            { q: "如果發球觸網後落入正確的發球區，應該？", options: ["A) 重發（Let）", "B) 發球失誤", "C) 繼續比賽", "D) 接發球方選擇重發或繼續"], answer: 2, points: 10, category: "rules", explanation: "Pickleball 沒有 Let 規則。發球觸網後落入正確發球區，比賽繼續。" },
            { q: "「Dink」是指什麼擊球？", options: ["A) 強力的底線抽球", "B) 輕柔的網前小球，落入對方 Kitchen", "C) 高吊球到對方底線", "D) 快速的截擊球"], answer: 1, points: 10, category: "technique", explanation: "Dink 是輕柔的網前小球，目的是讓球落入對方 Kitchen，迫使對方不能 Volley，是高級戰術的重要組成部分。" },
            { q: "「Third Shot Drop」的目的是？", options: ["A) 直接得分", "B) 讓球快速飛向對方底線", "C) 讓球輕柔落入對方 Kitchen，爭取上網時間", "D) 發球後立即得分"], answer: 2, points: 15, category: "technique", explanation: "Third Shot Drop 是發球方第三擊的戰術，輕柔地將球打入對方 Kitchen，爭取時間上網，從防守轉為進攻。" },
            { q: "球員在什麼情況下可以進入 Kitchen？", options: ["A) 任何時候都可以", "B) 只有在球彈跳後才能進入擊球", "C) 絕對不能進入", "D) 只有在發球時可以進入"], answer: 1, points: 15, category: "rules", explanation: "球員可以在球彈跳後進入 Kitchen 擊球，但不能在 Kitchen 內 Volley（空中擊球）。擊球後可以進入 Kitchen，只要擊球瞬間不在該區域內。" },
            { q: "只有哪一方可以得分？", options: ["A) 發球方", "B) 接發球方", "C) 雙方都可以", "D) 視乎誰贏了該球"], answer: 0, points: 10, category: "scoring", explanation: "只有發球方可以得分。如果接發球方贏了該球，只獲得發球權（Side Out），不得分。" },
            { q: "球網中央的高度是？", options: ["A) 34 英寸 (86cm)", "B) 36 英寸 (91cm)", "C) 30 英寸 (76cm)", "D) 32 英寸 (81cm)"], answer: 0, points: 10, category: "court", explanation: "球網中央高度 34 英寸 (86cm)，兩側高度 36 英寸 (91cm)。" },
            { q: "如果球員的衣服或身體觸網，應該？", options: ["A) 繼續比賽", "B) 該球員失分", "C) 重發", "D) 警告一次"], answer: 1, points: 10, category: "rules", explanation: "球員的衣服、身體或球拍觸網屬於犯規，該球員/隊伍失分。" },
            { q: "「Stacking」戰術是？", options: ["A) 雙打中兩位球員都站在同一側發球", "B) 發球後球員交換位置以發揮各自優勢", "C) 球員站在底線不動", "D) 球員都站在網前"], answer: 1, points: 15, category: "technique", explanation: "Stacking 是雙打戰術，發球後球員交換位置，讓正手強的球員保持在特定側，或讓兩位球員都用正手處理中路球。" },
            { q: "教練在比賽中可以？", options: ["A) 隨時叫暫停指導", "B) 在死球時給予簡短指導", "C) 進入場地指導", "D) 替球員決定戰術"], answer: 1, points: 10, category: "coaching", explanation: "教練可以在死球時給予簡短指導，但不能延誤比賽、進入場地或干擾對方。正式比賽中教練指導有限制。" },
            { q: "如果球擊中天花板或牆壁後落入對方場地，應該？", options: ["A) 繼續比賽", "B) 擊球方失分", "C) 重發", "D) 接球方選擇繼續或重發"], answer: 1, points: 10, category: "rules", explanation: "在室內場地，球擊中天花板或牆壁後落入對方場地屬於犯規，擊球方失分。" },
            { q: "「Erne」擊球是？", options: ["A) 在 Kitchen 外側繞過 Kitchen 進行 Volley", "B) 在底線強力抽球", "C) 在網前輕放小球", "D) 發球直接得分"], answer: 0, points: 15, category: "technique", explanation: "Erne 是高級技術，球員繞到 Kitchen 外側（場地外）進行 Volley，避開 Kitchen 限制，通常用於對付對方的 Dink。" },
            { q: "如果比分是 10-10，比賽如何結束？", options: ["A) 先得 11 分者勝", "B) 必須領先 2 分（如 12-10, 13-11）", "C) 抽籤決定", "D) 平手，加賽一局"], answer: 1, points: 10, category: "scoring", explanation: "必須領先 2 分獲勝。10-10 後繼續比賽直到一方領先 2 分，或達到封頂分數。" },
            { q: "初學者最常犯的發球錯誤是？", options: ["A) 發球太快", "B) 擊球點高於腰部", "C) 發球太短", "D) 不使用旋轉"], answer: 1, points: 10, category: "coaching", explanation: "初學者常犯錯誤是擊球點高於腰部（肚臍），或拍頭高於手腕，這都是發球犯規。" },

        // Quiz State

        // Start Quiz
        function startQuiz(mode) {
            quizState.score = 0;
            quizState.currentQuestion = 0;
            
            if (mode === 'basic') {
                quizState.questions = [...basicQuestions].sort(() => Math.random() - 0.5).slice(0, 5);
                quizState.timeLimit = 0; // No timer
            } else if (mode === 'coach') {
                quizState.questions = [...coachQuestions].sort(() => Math.random() - 0.5).slice(0, 10);
                quizState.timeLimit = 30;
            } else if (mode === 'mixed') {
                const all = [...basicQuestions, ...coachQuestions];
                quizState.questions = all.sort(() => Math.random() - 0.5).slice(0, 10);
                quizState.timeLimit = 30;
            }
            
            showQuestion();
        }

        function showQuestion() {
            if (quizState.currentQuestion >= quizState.questions.length) {
                endQuiz();
                return;
            }

            const q = quizState.questions[quizState.currentQuestion];
            const category = categoryNames[q.category] || q.category;
            
            let timerHTML = '';
            if (quizState.timeLimit > 0) {
                timerHTML = `
                    <div class="timer-bar">
                        <div class="timer-fill" id="timerFill" style="width: 100%;"></div>
                    </div>
                `;
            }
            
            document.getElementById('gameContent').innerHTML = `
                <div style="padding: 20px;">
                    ${timerHTML}
                    <div class="category-badge">${category}</div>
                    <p style="margin-bottom: 10px; color: #718096;">問題 ${quizState.currentQuestion + 1}/${quizState.questions.length}</p>
                    <div class="question">${q.q}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <button class="option-btn" onclick="selectAnswer(${i})">${opt}</button>
                        `).join('')}
                    </div>
                    <div id="feedback"></div>
                </div>
            `;
            
            // Start timer if enabled
            if (quizState.timeLimit > 0) {
                quizState.timeLeft = quizState.timeLimit;
                startTimer();
            }
        }

        function startTimer() {
            const fill = document.getElementById('timerFill');
            if (!fill) return;
            
            clearInterval(quizState.timer);
            quizState.timer = setInterval(() => {
                quizState.timeLeft -= 0.1;
                const pct = (quizState.timeLeft / quizState.timeLimit) * 100;
                fill.style.width = pct + '%';
                
                if (quizState.timeLeft <= 0) {
                    clearInterval(quizState.timer);
                    timeUp();
                }
            }, 100);
        }

        function timeUp() {
            const q = quizState.questions[quizState.currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            buttons[q.answer].classList.add('correct');
            
            gameState.streak = 0;
            updateStatus();
            
            document.getElementById('feedback').innerHTML = `
                <div class="feedback wrong">
                    ⏰ 時間到！<br><br>
                    <div class="explanation-box">
                        <strong>正確答案：</strong> ${q.options[q.answer]}<br><br>
                        <strong>💡 解釋：</strong> ${q.explanation}
                    </div>
                    <button class="btn" onclick="nextQuestion()" style="margin-top: 15px;">下一題 →</button>
                </div>
            `;
        }

        function selectAnswer(index) {
            clearInterval(quizState.timer);
            
            const q = quizState.questions[quizState.currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => btn.disabled = true);
            
            // Track stats
            gameState.quizStats.total++;
            
            if (index === q.answer) {
                buttons[index].classList.add('correct');
                gameState.quizStats.correct++;
                
                const points = q.points + (gameState.streak >= 3 ? 5 : 0);
                gameState.score += points;
                gameState.streak++;
                quizState.score++;
                
                document.getElementById('feedback').innerHTML = `
                    <div class="feedback correct">
                        ✅ 正確！+${points} 分 ${gameState.streak >= 3 ? '(🔥 連勝獎勵 +5!)' : ''}<br><br>
                        <div class="explanation-box">
                            <strong>💡 解釋：</strong> ${q.explanation}
                        </div>
                        <button class="btn" onclick="nextQuestion()" style="margin-top: 15px;">下一題 →</button>
                    </div>
                `;
            } else {
                buttons[index].classList.add('wrong');
                buttons[q.answer].classList.add('correct');
                gameState.streak = 0;
                
                document.getElementById('feedback').innerHTML = `
                    <div class="feedback wrong">
                        ❌ 錯誤！<br><br>

                        <button class="btn" onclick="nextQuestion()" style="margin-top: 15px;">下一題 →</button>
                    </div>

            updateStatus();
        }

        function reflexClick() {
            const btn = document.getElementById('reflexBtn');
            const target = document.getElementById('reflexTarget');
            const result = document.getElementById('reflexResult');

            if (!reflexState.waiting && !reflexState.startTime) {
                btn.disabled = true;
                btn.textContent = '等待中...';
                reflexState.waiting = true;
                
                const delay = Math.random() * 3000 + 2000;
                reflexState.timeout = setTimeout(() => {
                    reflexState.waiting = false;
                    reflexState.startTime = Date.now();
                    target.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '按我！🏓';
                }, delay);
            } else if (reflexState.waiting) {
                clearTimeout(reflexState.timeout);
                reflexState.waiting = false;
                btn.disabled = false;
                btn.textContent = '太快啦！再試一次 🏓';
            } else {
                const reaction = (Date.now() - reflexState.startTime) / 1000;
                let points, msg, color;
                
                if (reaction < 0.2) { points = 30; msg = '🏆 世界級反應！'; color = '#48bb78'; }
                else if (reaction < 0.3) { points = 20; msg = '⭐ 非常好！'; color = '#4299e1'; }
                else if (reaction < 0.4) { points = 15; msg = '👍 不錯！'; color = '#ed8936'; }
                else if (reaction < 0.5) { points = 10; msg = '🙂 平均'; color = '#ecc94b'; }
                else { points = 5; msg = '💪 繼續練習！'; color = '#f56565'; }
                
                gameState.score += points;
                gameState.gamesPlayed++;
                updateLevel();
                saveGame();
                
                result.innerHTML = `
                    <div style="color: ${color};">
                        <div style="font-size: 2em; margin-bottom: 10px;">${reaction.toFixed(3)} 秒</div>
                        <div>${msg}</div>
                        <div style="font-size: 1.2em; margin-top: 10px;">+${points} 分！</div>
                    </div>
                    <button class="btn" onclick="startReflex()" style="margin-top: 20px;">再玩一次 🔄</button>
                    <button class="btn back-btn" onclick="backToMenu()" style="margin-top: 20px;">返回選單</button>
                `;
                
                target.classList.remove('show');
                btn.style.display = 'none';
                reflexState.startTime = 0;
            }
        }

        // Serve Game
        let serveState = {
            attempt: 0,
            successful: 0
        };

        function startServe() {
            serveState.attempt = 0;
            serveState.successful = 0;
            
            document.getElementById('gameArea').classList.add('active');
            nextServe();
        }

        function nextServe() {
            if (serveState.attempt >= 5) {
                endServe();
                return;
            }

            serveState.attempt++;
            
            document.getElementById('gameContent').innerHTML = `
                <div class="reflex-area">
                    <h2 style="color: #667eea; margin-bottom: 20px;">🎯 發球挑戰</h2>
                    <p style="margin-bottom: 20px;">發球 ${serveState.attempt}/5</p>
                    <p style="margin-bottom: 30px; color: #718096;">喺啱嘅時機按按鈕發球！</p>
                    
                    <div style="width: 200px; height: 200px; margin: 0 auto 30px; position: relative; background: #f8f9fa; border-radius: 50%; border: 5px solid #667eea;">
                        <div id="serveTarget" style="position: absolute; width: 40px; height: 40px; background: #f56565; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
                    </div>
                    
                    <button id="serveBtn" class="btn" onclick="serveClick()" style="font-size: 1.3em; padding: 25px 50px;">
                        發球！🏓
                    </button>
                    
                    <div id="serveResult" style="margin-top: 30px; font-size: 1.3em;"></div>
                </div>
            `;

            const target = document.getElementById('serveTarget');
            let position = 50;
            let direction = 1;
            let speed = 2;
            
            window.serveAnimation = setInterval(() => {
                position += direction * speed;
                if (position > 80 || position < 20) direction *= -1;
                target.style.left = position + '%';
            }, 16);
        }

        function serveClick() {
            clearInterval(window.serveAnimation);
            
            const target = document.getElementById('serveTarget');
            const result = document.getElementById('serveResult');
            const btn = document.getElementById('serveBtn');
            
            const targetPos = parseFloat(target.style.left);
            const success = targetPos > 40 && targetPos < 60;
            
            if (success) {
                serveState.successful++;
                result.innerHTML = '<div style="color: #48bb78; font-size: 1.5em;">✅ 好球！入區！</div>';
            } else {
                result.innerHTML = '<div style="color: #f56565; font-size: 1.5em;">❌ 出界！</div>';
            }
            
            btn.disabled = true;
            
            setTimeout(() => {
                nextServe();
            }, 1500);
        }

        function endServe() {
            gameState.gamesPlayed++;
            const points = serveState.successful * 15;
            gameState.score += points;
            updateLevel();
            saveGame();
            
            let msg;
            if (serveState.successful === 5) msg = '🏆 完美！5/5';
            else if (serveState.successful >= 3) msg = '👍 不錯！';
            else msg = '💪 繼續練習！';
            
            document.getElementById('gameContent').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="color: #667eea; margin-bottom: 20px;">📊 發球成績</h2>
                    <div style="font-size: 3em; margin: 20px 0;">
                        ${serveState.successful}/5
                    </div>
                    <p style="color: #718096; margin-bottom: 20px;">${msg}</p>
                    <p style="font-size: 1.3em; color: #667eea; margin-bottom: 30px;">
                        +${points} 分！
                    </p>
                    <button class="btn" onclick="startServe()" style="margin: 10px;">再玩一次 🔄</button>
                    <button class="btn back-btn" onclick="backToMenu()" style="margin: 10px;">返回選單</button>
                </div>
            `;
        }

        // Show Progress
        function showProgress() {
            document.getElementById('gameArea').classList.add('active');
            document.getElementById('gameContent').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="color: #667eea; margin-bottom: 20px;">📊 你的進度</h2>
                    
                    <div class="status-bar" style="margin-bottom: 30px;">
                        <div class="status-item">
                            <div class="label">等級</div>
                            <div class="value">Lv.${gameState.level}</div>
                            <div class="level-badge">${gameState.title}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">積分</div>
                            <div class="value">${gameState.score}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">遊戲次數</div>
                            <div class="value">${gameState.gamesPlayed}</div>
                        </div>
                    </div>
                    
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <h3 style="margin-bottom: 15px;">📝 測驗統計</h3>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="num">${gameState.quizStats.total}</div>
                                <div class="lbl">總題目</div>
                            </div>
                            <div class="stat-box">
                                <div class="num">${gameState.quizStats.correct}</div>
                                <div class="lbl">正確</div>
                            </div>
                            <div class="stat-box">
                                <div class="num">${gameState.quizStats.total > 0 ? Math.round(gameState.quizStats.correct / gameState.quizStats.total * 100) : 0}%</div>
                                <div class="lbl">準確率</div>
                            </div>
                            <div class="stat-box">
                                <div class="num">${gameState.quizStats.bestScore}%</div>
                                <div class="lbl">最佳</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <h3 style="margin-bottom: 15px;">🎯 下一目標</h3>
                        <p>再得 <strong style="color: #667eea;">${Math.max(0, levels[gameState.level]?.minScore - gameState.score || 0)}</strong> 分就可以升級！</p>
                        <div class="progress-bar" style="margin-top: 15px;">
                            <div class="progress-fill" style="width: ${Math.min(100, (gameState.score / 500) * 100)}%;"></div>
                        </div>
                    </div>
                    
                    <div style="background: #fed7d7; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #f56565;">
                        <h3 style="margin-bottom: 10px; color: #742a2a;">⚠️ 危險區域</h3>
                        <p style="color: #742a2a; margin-bottom: 15px;">重置將清除所有進度（等級、積分、統計）</p>
                        <button class="btn" onclick="resetProgress()" style="background: #f56565;">🗑️ 重置進度</button>
                    </div>
                    
                    <button class="btn" onclick="backToMenu()">繼續挑戰 🚀</button>
                </div>
            `;
        }

        // Auto-save on page unload
        window.addEventListener('beforeunload', () => {
            saveGame();
        });

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>

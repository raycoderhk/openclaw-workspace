name: 🚀 Deploy to Zeabur - Gameworld

on:
  push:
    branches: [ main ]
    paths:
      - 'games/2048-game/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Gameworld to Zeabur
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Zeabur CLI
        run: |
          curl -Ls https://github.com/zeabur/cli/releases/latest/download/zeabur-cli-linux-amd64 -o /tmp/zeabur
          chmod +x /tmp/zeabur
      
      - name: Deploy to Zeabur
        env:
          ZEABUR_API_KEY: ${{ secrets.ZEABUR_API_KEY }}
          ZEABUR_PROJECT_ID: ${{ secrets.ZEABUR_GAMEWORLD_PROJECT_ID }}
          ZEABUR_SERVICE_ID: ${{ secrets.ZEABUR_GAMEWORLD_SERVICE_ID }}
        run: |
          /tmp/zeabur deploy --project $ZEABUR_PROJECT_ID --service $ZEABUR_SERVICE_ID --dir games/2048-game
          echo "✅ Gameworld deployed successfully!"
          echo "🌐 URL: https://gameworld.zeabur.app"
